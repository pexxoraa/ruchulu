upstream ruchulu_api {
    server api:4000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Basic security headers (in addition to Helmet inside the API)
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";

    # --- Backend API ---
    location /api/ {
        proxy_pass http://ruchulu_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # --- Swagger UI / OpenAPI docs ---
    location /docs {
        proxy_pass http://ruchulu_api/docs;
        proxy_set_header Host $host;
    }
    location /docs.json {
        proxy_pass http://ruchulu_api/docs.json;
        proxy_set_header Host $host;
    }

    # --- Health check ---
    location /health {
        proxy_pass http://ruchulu_api/health;
        access_log off;
    }

    # --- Static frontend ---
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache product photography aggressively; HTML/CSS/JS stay revalidated
    location /images/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
